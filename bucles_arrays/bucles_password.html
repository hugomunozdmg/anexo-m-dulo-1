<!doctype html>
<html lang="esp">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>
    <style>
        p {
            color: red;
        }
    </style>
</head>

<body>
    <div>
        <input type="text" id="password" />
        <button onclick="save()">guardar</button>
    </div>
    <div>
        <p id="error-length"></p>
        <p id="error-number"></p>
        <p id="error-mayus"></p>
    </div>
    <script>
        function save() {
            let password = document.getElementById("password").value;

            //====================

            if (!enoughLenght(password)) {
                showError(
                    "error-length",
                    "La contraseña debe tener como mínimo 8 caracteres",
                );
                setTimeout(() => clearError("error-length"), 2000);
            }

            if (!findMayus(password)) {
                showError("error-mayus", "La contraseña debe tener mayusculas");
                setTimeout(() => clearError("error-mayus"), 2000);
            }

            if (!findNumber(password)) {
                showError("error-number", "La contraseña debe contener números");
                setTimeout(() => clearError("error-number"), 2000);
            }
        }

        //====================

        function clearError(id) {
            document.getElementById(id).innerText = "";
        }

        function showError(id, error_message) {
            document.getElementById(id).innerText = error_message;
        }

        function enoughLenght(password) {
            const minLength = 8;
            return password.length >= minLength;
        }

        function findMayus(password) {
            for (let i = 0; i < password.length; i++) {
                let character = password.substring(i, i + 1);
                if (!(character.toUpperCase() !== character)) {
                    console.log(password.charAt(i));
                    return true;
                }
            }
            return false;
        }

        function findNumber(password) {
            for (let i = 0; i < password.length; i++) {
                let caracter = password.substring(i, i + 1);
                if (parseInt(caracter)) {
                    return true;
                }
            }
            return false;
        }
    </script>
</body>

</html>
